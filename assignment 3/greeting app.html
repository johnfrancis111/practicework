<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Exercises</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      padding: 32px;
    }

    h1 { margin-bottom: 24px; }

    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 24px;
      max-width: 400px;
      margin-bottom: 20px;
    }

    h2 { margin: 0 0 16px; font-size: 18px; }

    input {
      display: block;
      width: 100%;
      padding: 8px 12px;
      font-size: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
      margin-bottom: 10px;
      box-sizing: border-box;
    }

    button {
      padding: 8px 18px;
      font-size: 14px;
      background: #333;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    p.output {
      margin-top: 12px;
      font-size: 15px;
    }
  </style>
</head>
<body>

  <h1>Exercises</h1>

  <!-- 1. Greeting App -->
  <div class="card">
    <h2>Greeting App</h2>
    <input type="text" id="nameInput" placeholder="Enter your name" oninput="greet()">
    <p class="output" id="greetOutput"></p>
  </div>

  <!-- 2. Favorite Color Form -->
  <div class="card">
    <h2>Favorite Color Form</h2>
    <input type="text" id="colorInput" placeholder="Enter your favorite color">
    <button onclick="showColor()">Submit</button>
    <p class="output" id="colorOutput"></p>
  </div>

  <!-- 3. Age Display Form -->
  <div class="card">
    <h2>Age Display Form</h2>
    <input type="number" id="yearInput" placeholder="Enter your birth year" oninput="showAge()">
    <p class="output" id="ageOutput"></p>
  </div>

  <script>
    function greet() {
      const name = document.getElementById("nameInput").value;
      document.getElementById("greetOutput").textContent = name ? "Hello, " + name + "!" : "";
    }

    function showColor() {
      const color = document.getElementById("colorInput").value;
      const out = document.getElementById("colorOutput");
      out.textContent = color ? "Your favorite color is " + color + "!" : "";
      out.style.color = color || "";
    }

    function showAge() {
      const year = parseInt(document.getElementById("yearInput").value);
      const out = document.getElementById("ageOutput");
      const age = new Date().getFullYear() - year;
      out.textContent = year && age >= 0 ? "You are " + age + " years old." : "";
    }
  </script>

</body>
</html>
